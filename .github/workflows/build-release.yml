name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: docker.io
  ORG: rancher
  REPO: rancher-charts

jobs:
  parse-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      major: ${{ steps.parse.outputs.major }}
      build_type: ${{ steps.parse.outputs.build_type }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          MAJOR=$(echo $VERSION | cut -d. -f1)

          # Detect build type from tag format
          # Clean semver (v1.0.0) = prod, anything else (v1.0.0-rc.1) = dev
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            BUILD_TYPE=prod
            echo "Clean semver detected - PROD build"
          else
            BUILD_TYPE=dev
            echo "Prerelease detected - DEV build"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT

  build-and-push:
    needs: parse-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag-suffix: ""
            platforms: linux/amd64,linux/arm64
          - tag-suffix: "-amd64"
            platforms: linux/amd64
          - tag-suffix: "-arm64"
            platforms: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          make build \
            CHART_MAJOR=${{ needs.parse-tag.outputs.major }} \
            VERSION=${{ needs.parse-tag.outputs.version }}${{ matrix.tag-suffix }} \
            TARGET_PLATFORMS=${{ matrix.platforms }}

          docker push "${REGISTRY}/${ORG}/${REPO}:${{ needs.parse-tag.outputs.version }}${{ matrix.tag-suffix }}"

      - name: Generate image metadata
        if: matrix.tag-suffix == ''
        run: |
          docker inspect "${REGISTRY}/${ORG}/${REPO}:${{ needs.parse-tag.outputs.version }}" \
            --format='{{json .Config.Labels}}' | jq . > image-labels.json

      - name: Upload image metadata
        if: matrix.tag-suffix == ''
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata-${{ needs.parse-tag.outputs.major }}
          path: image-labels.json

  create-rancher-pr:
    needs: [parse-tag, build-and-push]
    if: success() && needs.parse-tag.outputs.build_type == 'prod'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Rancher target branch
        id: rancher
        run: |
          MAJOR=${{ needs.parse-tag.outputs.major }}
          RANCHER_BRANCH=$(yq eval ".chart-versions.\"${MAJOR}\".rancher-branch" config.yaml)
          echo "branch=$RANCHER_BRANCH" >> $GITHUB_OUTPUT

      - name: Create PR to rancher/rancher
        run: |
          VERSION="${{ needs.parse-tag.outputs.version }}"

          gh pr create --repo rancher/rancher \
            --base ${{ steps.rancher.outputs.branch }} \
            --title "Update to rancher-charts ${VERSION}" \
            --body "## Rancher Charts Update

**Version**: \`${VERSION}\`
**Chart Major**: \`${{ needs.parse-tag.outputs.major }}\`
**Image**: \`${REGISTRY}/${ORG}/${REPO}:${VERSION}\`

### Changes
This updates the rancher-charts image to ${VERSION}.

### Updates Required
- [ ] Update \`build.yaml\`: \`defaultChartsImage: ${REGISTRY}/${ORG}/${REPO}:${VERSION}\`
- [ ] Run \`go generate\` to update chart values

🤖 Automated PR from rancher-assets release workflow"
        env:
          GH_TOKEN: ${{ secrets.RANCHER_REPO_TOKEN }}

  create-github-release:
    needs: [parse-tag, build-and-push]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image metadata
        uses: actions/download-artifact@v4
        with:
          name: image-metadata-${{ needs.parse-tag.outputs.major }}

      - name: Create GitHub Release
        run: |
          VERSION="${{ needs.parse-tag.outputs.version }}"
          MAJOR="${{ needs.parse-tag.outputs.major }}"
          BUILD_TYPE="${{ needs.parse-tag.outputs.build_type }}"

          if [ "$BUILD_TYPE" = "prod" ]; then
            RELEASE_NAME="Rancher Charts ${VERSION}"
            PRERELEASE_FLAG=""
          else
            RELEASE_NAME="Rancher Charts ${VERSION} (Pre-release)"
            PRERELEASE_FLAG="--prerelease"
          fi

          # Extract labels for release notes
          CHART_BRANCH=$(jq -r '.\"io.rancher.charts.branch\"' image-labels.json)
          CHART_COMMIT=$(jq -r '.\"io.rancher.charts.commit\"' image-labels.json)
          PARTNER_BRANCH=$(jq -r '.\"io.rancher.partner.branch\"' image-labels.json)
          PARTNER_COMMIT=$(jq -r '.\"io.rancher.partner.commit\"' image-labels.json)
          RKE2_BRANCH=$(jq -r '.\"io.rancher.rke2.branch\"' image-labels.json)
          RKE2_COMMIT=$(jq -r '.\"io.rancher.rke2.commit\"' image-labels.json)
          TARGET_BRANCH=$(jq -r '.\"io.rancher.target-branch\"' image-labels.json)

          gh release create "${VERSION}" \
            --title "${RELEASE_NAME}" \
            --notes "## Rancher Charts ${VERSION}

**Chart Major**: ${MAJOR}
**Target Rancher Branch**: ${TARGET_BRANCH}
**Build Type**: ${BUILD_TYPE}

### Image
\`\`\`
${REGISTRY}/${ORG}/${REPO}:${VERSION}
\`\`\`

### Upstream Sources
| Repository | Branch | Commit |
|------------|--------|--------|
| rancher/charts | ${CHART_BRANCH} | \`${CHART_COMMIT:0:8}\` |
| rancher/partner-charts | ${PARTNER_BRANCH} | \`${PARTNER_COMMIT:0:8}\` |
| rancher/rke2-charts | ${RKE2_BRANCH} | \`${RKE2_COMMIT:0:8}\` |

### Multi-arch Images
- \`${REGISTRY}/${ORG}/${REPO}:${VERSION}\` (linux/amd64, linux/arm64)
- \`${REGISTRY}/${ORG}/${REPO}:${VERSION}-amd64\` (linux/amd64)
- \`${REGISTRY}/${ORG}/${REPO}:${VERSION}-arm64\` (linux/arm64)
" \
            ${PRERELEASE_FLAG}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
