name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  REPO: rancher-assets

jobs:
  parse-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      major: ${{ steps.parse.outputs.major }}
      build_type: ${{ steps.parse.outputs.build_type }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          MAJOR=$(echo $VERSION | cut -d. -f1)

          # Detect build type from tag format
          # Clean semver (v1.0.0) = prod, anything else (v1.0.0-rc.1) = dev
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            BUILD_TYPE=prod
            echo "Clean semver detected - PROD build"
          else
            BUILD_TYPE=dev
            echo "Prerelease detected - DEV build"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT

  build-and-push:
    needs: parse-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          make build \
            REGISTRY=${{ env.REGISTRY }} \
            ORG=${{ github.repository_owner }} \
            REPO=${{ env.REPO }} \
            CHART_MAJOR=${{ needs.parse-tag.outputs.major }} \
            VERSION=${{ needs.parse-tag.outputs.version }} \
            TARGET_PLATFORMS=linux/amd64,linux/arm64

          docker push "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO }}:${{ needs.parse-tag.outputs.version }}"

      - name: Generate image metadata
        run: |
          docker inspect "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO }}:${{ needs.parse-tag.outputs.version }}" \
            --format='{{json .Config.Labels}}' | jq . > image-labels.json

      - name: Upload image metadata
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata-${{ needs.parse-tag.outputs.major }}
          path: image-labels.json

  create-rancher-pr:
    needs: [parse-tag, build-and-push]
    if: success() && needs.parse-tag.outputs.build_type == 'prod'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Rancher target branch
        id: rancher
        run: |
          MAJOR=${{ needs.parse-tag.outputs.major }}
          RANCHER_BRANCH=$(yq eval ".chart-versions.\"${MAJOR}\".rancher-branch" config.yaml)
          echo "branch=$RANCHER_BRANCH" >> $GITHUB_OUTPUT

      - name: Create PR to rancher/rancher
        run: |
          VERSION="${{ needs.parse-tag.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO }}:${VERSION}"

          PR_BODY=$(.github/scripts/generate-rancher-pr-body.sh \
            "$VERSION" \
            "${{ needs.parse-tag.outputs.major }}" \
            "$IMAGE")

          gh pr create --repo rancher/rancher \
            --base ${{ steps.rancher.outputs.branch }} \
            --title "Update to rancher-assets ${VERSION}" \
            --body "$PR_BODY"
        env:
          GH_TOKEN: ${{ secrets.RANCHER_REPO_TOKEN }}

  create-github-release:
    needs: [parse-tag, build-and-push]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image metadata
        uses: actions/download-artifact@v4
        with:
          name: image-metadata-${{ needs.parse-tag.outputs.major }}

      - name: Create GitHub Release
        run: |
          VERSION="${{ needs.parse-tag.outputs.version }}"
          MAJOR="${{ needs.parse-tag.outputs.major }}"
          BUILD_TYPE="${{ needs.parse-tag.outputs.build_type }}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO }}:${VERSION}"

          if [ "$BUILD_TYPE" = "prod" ]; then
            RELEASE_NAME="Rancher Assets ${VERSION}"
            PRERELEASE_FLAG=""
          else
            RELEASE_NAME="Rancher Assets ${VERSION} (Pre-release)"
            PRERELEASE_FLAG="--prerelease"
          fi

          # Extract labels for release notes
          CHART_BRANCH=$(jq -r '.\"io.rancher.charts.branch\"' image-labels.json)
          CHART_COMMIT=$(jq -r '.\"io.rancher.charts.commit\"' image-labels.json)
          PARTNER_BRANCH=$(jq -r '.\"io.rancher.partner.branch\"' image-labels.json)
          PARTNER_COMMIT=$(jq -r '.\"io.rancher.partner.commit\"' image-labels.json)
          RKE2_BRANCH=$(jq -r '.\"io.rancher.rke2.branch\"' image-labels.json)
          RKE2_COMMIT=$(jq -r '.\"io.rancher.rke2.commit\"' image-labels.json)
          TARGET_BRANCH=$(jq -r '.\"io.rancher.target-branch\"' image-labels.json)

          RELEASE_NOTES=$(.github/scripts/generate-release-notes.sh \
            "$VERSION" \
            "$MAJOR" \
            "$BUILD_TYPE" \
            "$IMAGE" \
            "$TARGET_BRANCH" \
            "$CHART_BRANCH" \
            "$CHART_COMMIT" \
            "$PARTNER_BRANCH" \
            "$PARTNER_COMMIT" \
            "$RKE2_BRANCH" \
            "$RKE2_COMMIT")

          gh release create "${VERSION}" \
            --title "${RELEASE_NAME}" \
            --notes "$RELEASE_NOTES" \
            ${PRERELEASE_FLAG}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
