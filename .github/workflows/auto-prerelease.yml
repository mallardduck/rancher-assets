name: Auto Pre-release

# Triggers on lock.yaml changes, which is the source of truth for all build inputs:
# - Upstream commit refs (what charts are bundled)
# - Package script hash (how charts are copied)
# - Generated by 'make generate' which runs on config.yaml, package/, or upstream changes
# This ensures we only release when meaningful build inputs change, not just timestamps

on:
  push:
    branches:
      - main
    paths:
      - 'lock.yaml'

permissions:
  contents: write

concurrency:
  group: auto-prerelease
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_majors: ${{ steps.detect.outputs.changed_majors }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
      commit_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get commit SHA
        id: commit
        run: |
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Detect changed chart majors from lock.yaml
        id: detect
        run: |
          # Use Go tool to detect changes (cleaner than bash)
          CHANGED_MAJORS=$(go run main.go changed-majors --from=HEAD^ --to=HEAD --verbose)

          # Extract JSON array (last line of output)
          CHANGED_MAJORS_JSON=$(echo "$CHANGED_MAJORS" | tail -1)

          echo "changed_majors=$CHANGED_MAJORS_JSON" >> $GITHUB_OUTPUT

          # Check if empty array
          if [ "$CHANGED_MAJORS_JSON" = "[]" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  plan-prereleases:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_plan: ${{ steps.plan.outputs.release_plan }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up versions worktree
        run: |
          # Fetch versions branch and set up worktree
          git fetch origin versions
          git worktree add ./versions-dir origin/versions

      - name: Plan prerelease bumps
        id: plan
        run: |
          # Use Go tool to plan releases (main.go in current dir, versions.yaml in worktree)
          RELEASE_PLAN=$(go run main.go plan-release \
            --versions-file=./versions-dir/versions.yaml \
            --type=auto \
            --changed-majors='${{ needs.detect-changes.outputs.changed_majors }}' \
            --verbose)

          # Extract JSON array (last line of output)
          RELEASE_PLAN_JSON=$(echo "$RELEASE_PLAN" | tail -1)
          echo "release_plan=$RELEASE_PLAN_JSON" >> $GITHUB_OUTPUT

          echo ""
          echo "Auto Pre-release Plan:"
          echo "$RELEASE_PLAN_JSON" | jq .

      - name: Summary
        run: |
          echo "## Auto Pre-release Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ needs.detect-changes.outputs.commit_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.plan.outputs.release_plan }}' | jq -r '.[] | "- **\(.major)**: \(.new_version)"' >> $GITHUB_STEP_SUMMARY

  create-tags:
    needs: [detect-changes, plan-prereleases]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        release: ${{ fromJson(needs.plan-prereleases.outputs.release_plan) }}
    steps:
      - name: Checkout at commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-changes.outputs.commit_sha }}
          fetch-depth: 0

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
        run: |
          echo "Creating auto prerelease tag ${{ matrix.release.new_version }} at ${{ needs.detect-changes.outputs.commit_sha }}"

          # Debug: Check which token is being used
          if [ -n "${{ secrets.WORKFLOW_PAT }}" ]; then
            echo "Using WORKFLOW_PAT (will trigger workflows)"
          else
            echo "WARNING: Using GITHUB_TOKEN fallback (will NOT trigger workflows)"
            echo "Configure WORKFLOW_PAT secret to enable automated builds"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          .github/scripts/create-prerelease-tag.sh \
            "${{ matrix.release.new_version }}" \
            "${{ matrix.release.major }}" \
            "${{ matrix.release.current_stable }}" \
            "${{ matrix.release.current_prerelease }}"

          # Use gh to setup git auth and push (WORKFLOW_PAT required to trigger workflows)
          gh auth setup-git
          git push origin "${{ matrix.release.new_version }}"

  update-versions-branch:
    needs: [detect-changes, plan-prereleases, create-tags]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main for scripts
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout versions branch
        uses: actions/checkout@v4
        with:
          ref: versions
          fetch-depth: 1
          path: versions

      - name: Update versions.yaml
        working-directory: versions
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo '${{ needs.plan-prereleases.outputs.release_plan }}' | jq -c '.[]' | while read -r release; do
            MAJOR=$(echo "$release" | jq -r '.major')
            NEW_VERSION=$(echo "$release" | jq -r '.new_version')

            echo "Updating $MAJOR prerelease to $NEW_VERSION"

            yq eval ".${MAJOR}.prerelease.tag = \"${NEW_VERSION}\"" -i versions.yaml
            yq eval ".${MAJOR}.prerelease.updated-at = \"${TIMESTAMP}\"" -i versions.yaml
          done

      - name: Commit and push
        working-directory: versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add versions.yaml

          if git diff --cached --quiet; then
            echo "No changes to versions.yaml"
            exit 0
          fi

          ../main/.github/scripts/update-versions-auto.sh \
            "${{ needs.detect-changes.outputs.commit_sha }}" \
            "${{ needs.detect-changes.outputs.changed_majors }}"

          git push origin versions
