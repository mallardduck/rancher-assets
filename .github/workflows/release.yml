name: Build and Release Rancher Assets Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  REPO: rancher-assets

jobs:
  parse-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      major: ${{ steps.parse.outputs.major }}
      build_type: ${{ steps.parse.outputs.build_type }}
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          MAJOR=$(echo $VERSION | cut -d. -f1)

          # Detect build type from tag format
          # Clean semver (v1.0.0) = prod, anything else (v1.0.0-rc.1) = dev
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            BUILD_TYPE=prod
            echo "Clean semver detected - PROD build"
          else
            BUILD_TYPE=dev
            echo "Prerelease detected - DEV build"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT

      - name: Get release ID
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.parse.outputs.version }}
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/${VERSION} --jq '.id')
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

  build-and-push:
    needs: parse-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: rancher/ecm-distro-tools/actions/publish-image@master
        with:
          image: ${{ env.REPO }}
          tag: ${{ needs.parse-tag.outputs.version }}
          platforms: linux/amd64,linux/arm64

          push-to-public: true
          public-registry: ghcr.io
          public-repo: ${{ github.repository_owner }}
          public-username: ${{ github.repository_owner }}
          public-password: ${{ secrets.GITHUB_TOKEN }}

          push-to-prime: false

          make-target: push-image
        env:
          CHART_MAJOR: ${{ needs.parse-tag.outputs.major }}
          VERSION: ${{ needs.parse-tag.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TARGET_PLATFORMS: linux/amd64,linux/arm64
          IMAGE_REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO }}

  create-rancher-pr:
    needs: [parse-tag, build-and-push]
    if: success() && needs.parse-tag.outputs.build_type == 'prod'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Rancher target branch
        id: rancher
        run: |
          MAJOR=${{ needs.parse-tag.outputs.major }}
          RANCHER_BRANCH=$(yq eval ".chart-versions.\"${MAJOR}\".rancher-branch" config.yaml)
          echo "branch=$RANCHER_BRANCH" >> $GITHUB_OUTPUT

      - name: Create PR to rancher/rancher
        run: |
          VERSION="${{ needs.parse-tag.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO }}:${VERSION}"

          PR_BODY=$(.github/scripts/generate-rancher-pr-body.sh \
            "$VERSION" \
            "${{ needs.parse-tag.outputs.major }}" \
            "$IMAGE")

          gh pr create --repo rancher/rancher \
            --base ${{ steps.rancher.outputs.branch }} \
            --title "Update to rancher-assets ${VERSION}" \
            --body "$PR_BODY"
        env:
          GH_TOKEN: ${{ secrets.RANCHER_REPO_TOKEN }}

  publish-release:
    needs: [parse-tag, build-and-push]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (undraft)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.parse-tag.outputs.release_id }},
              draft: false
            });
            console.log('Release ${{ needs.parse-tag.outputs.version }} published successfully!');
