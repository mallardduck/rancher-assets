name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  REPO: rancher-assets

jobs:
  parse-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      major: ${{ steps.parse.outputs.major }}
      build_type: ${{ steps.parse.outputs.build_type }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Parse tag
        id: parse
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          MAJOR=$(echo $VERSION | cut -d. -f1)

          # Detect build type from tag format
          # Clean semver (v1.0.0) = prod, anything else (v1.0.0-rc.1) = dev
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            BUILD_TYPE=prod
            PRERELEASE=false
            echo "Clean semver detected - PROD build"
          else
            BUILD_TYPE=dev
            PRERELEASE=true
            echo "Prerelease detected - DEV build"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

      - name: Get tag message
        id: tag_message
        run: |
          VERSION=${{ steps.parse.outputs.version }}
          TAG_MESSAGE=$(git tag -l --format='%(contents)' "$VERSION")
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate draft release body
        id: draft_body
        run: |
          BODY=$(.github/scripts/generate-release-notes.sh \
            "${{ steps.parse.outputs.version }}" \
            "${{ steps.parse.outputs.major }}" \
            "${{ steps.parse.outputs.build_type }}" \
            --draft \
            --tag-message "${{ steps.tag_message.outputs.message }}")

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create draft release
        id: create_release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1.1.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.parse.outputs.version }}
          release_name: Rancher Assets ${{ steps.parse.outputs.version }}
          draft: true
          prerelease: ${{ steps.parse.outputs.prerelease }}
          body: ${{ steps.draft_body.outputs.body }}

  build-and-push:
    needs: parse-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: rancher/ecm-distro-tools/actions/publish-image@03cb52c4bd23670a192d47ef7b49d566928738d6 # v0.72.0
        with:
          image: ${{ env.REPO }}
          tag: ${{ needs.parse-tag.outputs.version }}
          platforms: linux/amd64,linux/arm64

          push-to-public: true
          public-registry: ghcr.io
          public-repo: ${{ github.repository_owner }}
          public-username: ${{ github.repository_owner }}
          public-password: ${{ secrets.GITHUB_TOKEN }}

          push-to-prime: false

          make-target: push-image
        env:
          CHART_MAJOR: ${{ needs.parse-tag.outputs.major }}
          VERSION: ${{ needs.parse-tag.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TARGET_PLATFORMS: linux/amd64,linux/arm64
          IMAGE_REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO }}

  export-image-lists:
    needs: [parse-tag, build-and-push]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.23'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image lists
        run: |
          make export-images \
            CHART_MAJOR=${{ needs.parse-tag.outputs.major }} \
            VERSION=${{ needs.parse-tag.outputs.version }} \
            IMAGE_REPO=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO }}

      - name: Upload image lists as release assets
        run: |
          VERSION="${{ needs.parse-tag.outputs.version }}"
          gh release upload "$VERSION" dist/$VERSION/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: [parse-tag, build-and-push, export-image-lists]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get tag message
        id: tag_message
        run: |
          VERSION=${{ needs.parse-tag.outputs.version }}
          TAG_MESSAGE=$(git tag -l --format='%(contents)' "$VERSION")
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate final release body
        id: final_body
        run: |
          BODY=$(.github/scripts/generate-release-notes.sh \
            "${{ needs.parse-tag.outputs.version }}" \
            "${{ needs.parse-tag.outputs.major }}" \
            "${{ needs.parse-tag.outputs.build_type }}" \
            --tag-message "${{ steps.tag_message.outputs.message }}")

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish release (undraft)
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.parse-tag.outputs.release_id }},
              draft: false,
              body: `${{ steps.final_body.outputs.body }}`
            });
            console.log('Release ${{ needs.parse-tag.outputs.version }} published successfully!');

  create-rancher-pr:
    needs: [parse-tag, publish-release]
    if: success() && needs.parse-tag.outputs.build_type == 'prod'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get Rancher target branch
        id: rancher
        run: |
          MAJOR=${{ needs.parse-tag.outputs.major }}
          RANCHER_BRANCH=$(yq eval ".chart-versions.\"${MAJOR}\".rancher-branch" config.yaml)
          echo "branch=$RANCHER_BRANCH" >> $GITHUB_OUTPUT

      - name: Create PR to rancher/rancher
        run: |
          VERSION="${{ needs.parse-tag.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO }}:${VERSION}"

          PR_BODY=$(.github/scripts/generate-rancher-pr-body.sh \
            "$VERSION" \
            "${{ needs.parse-tag.outputs.major }}" \
            "$IMAGE")

          gh pr create --repo rancher/rancher \
            --base ${{ steps.rancher.outputs.branch }} \
            --title "Update to rancher-assets ${VERSION}" \
            --body "$PR_BODY"
        env:
          GH_TOKEN: ${{ secrets.RANCHER_REPO_TOKEN }}
