name: Manual Release

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to release (default: HEAD of main)'
        required: false
        default: ''
        type: string
      chart_major:
        description: 'Chart major (leave empty for ALL active majors)'
        required: false
        type: choice
        options:
          - ''
          - v0
          - v1
      bump_type:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - minor
          - patch
      release_type:
        description: 'Release type'
        required: true
        type: choice
        default: prerelease
        options:
          - prerelease
          - stable

permissions:
  contents: write

jobs:
  validate-and-plan:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.setup.outputs.commit_sha }}
      chart_majors: ${{ steps.setup.outputs.chart_majors }}
      release_plan: ${{ steps.plan.outputs.release_plan }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha || 'main' }}
          fetch-depth: 0

      - name: Setup commit and majors
        id: setup
        run: |
          # Determine commit SHA
          if [ -z "${{ github.event.inputs.commit_sha }}" ]; then
            COMMIT_SHA=$(git rev-parse HEAD)
            echo "Using HEAD of main: $COMMIT_SHA"
          else
            COMMIT_SHA="${{ github.event.inputs.commit_sha }}"
            echo "Using specified commit: $COMMIT_SHA"

            # Verify commit exists
            if ! git cat-file -e ${COMMIT_SHA}^{commit} 2>/dev/null; then
              echo "Error: Commit ${COMMIT_SHA} not found"
              exit 1
            fi
          fi
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT

          # Determine chart majors to release
          if [ -z "${{ github.event.inputs.chart_major }}" ]; then
            echo "Releasing ALL active chart majors"
            MAJORS=$(yq eval '.chart-versions | keys | .[]' config.yaml | jq -R -s -c 'split("\n")[:-1]')
          else
            echo "Releasing only ${{ github.event.inputs.chart_major }}"
            MAJORS='["${{ github.event.inputs.chart_major }}"]'
          fi
          echo "chart_majors=$MAJORS" >> $GITHUB_OUTPUT

      - name: Fetch versions branch
        run: |
          git fetch origin versions:versions

      - name: Plan version bumps
        id: plan
        run: |
          # Checkout versions branch to read current versions
          git checkout versions

          # Use Go tool to plan releases
          RELEASE_PLAN=$(go run main.go plan-release \
            --versions-file=versions.yaml \
            --type=manual \
            --majors='${{ steps.setup.outputs.chart_majors }}' \
            --bump='${{ github.event.inputs.bump_type }}' \
            --release='${{ github.event.inputs.release_type }}' \
            --verbose)

          # Extract JSON array (last line of output)
          RELEASE_PLAN_JSON=$(echo "$RELEASE_PLAN" | tail -1)
          echo "release_plan=$RELEASE_PLAN_JSON" >> $GITHUB_OUTPUT

          echo ""
          echo "Release Plan:"
          echo "$RELEASE_PLAN_JSON" | jq .

      - name: Summary
        run: |
          echo "## Release Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ steps.setup.outputs.commit_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Bump Type**: ${{ github.event.inputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release Type**: ${{ github.event.inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.plan.outputs.release_plan }}' | jq -r '.[] | "- **\(.major)**: \(.new_version)"' >> $GITHUB_STEP_SUMMARY

  create-tags:
    needs: validate-and-plan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        release: ${{ fromJson(needs.validate-and-plan.outputs.release_plan) }}
    steps:
      - name: Checkout at commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-and-plan.outputs.commit_sha }}
          fetch-depth: 0

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ matrix.release.new_version }}"
          MAJOR="${{ matrix.release.major }}"

          echo "Creating tag $VERSION at ${{ needs.validate-and-plan.outputs.commit_sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          .github/scripts/create-release-tag.sh \
            "$VERSION" \
            "$MAJOR" \
            "${{ github.event.inputs.release_type }}" \
            "${{ github.event.inputs.bump_type }}" \
            "${{ matrix.release.current_stable }}" \
            "${{ matrix.release.current_prerelease }}"

          # Use gh to setup git auth and push (WORKFLOW_PAT required to trigger workflows)
          gh auth setup-git
          git push origin "$VERSION"

  update-versions-branch:
    needs: [validate-and-plan, create-tags]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main for scripts
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout versions branch
        uses: actions/checkout@v4
        with:
          ref: versions
          fetch-depth: 1
          path: versions

      - name: Update versions.yaml
        working-directory: versions
        run: |
          RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo '${{ needs.validate-and-plan.outputs.release_plan }}' | jq -c '.[]' | while read -r release; do
            MAJOR=$(echo "$release" | jq -r '.major')
            NEW_VERSION=$(echo "$release" | jq -r '.new_version')

            echo "Updating $MAJOR to $NEW_VERSION ($RELEASE_TYPE)"

            yq eval ".${MAJOR}.${RELEASE_TYPE}.tag = \"${NEW_VERSION}\"" -i versions.yaml
            yq eval ".${MAJOR}.${RELEASE_TYPE}.updated-at = \"${TIMESTAMP}\"" -i versions.yaml
          done

      - name: Commit and push
        working-directory: versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add versions.yaml

          if git diff --cached --quiet; then
            echo "No changes to versions.yaml"
            exit 0
          fi

          ../main/.github/scripts/update-versions-manual.sh \
            "${{ github.event.inputs.release_type }}" \
            "${{ github.event.inputs.bump_type }}" \
            "${{ needs.validate-and-plan.outputs.chart_majors }}" \
            "${{ needs.validate-and-plan.outputs.commit_sha }}"

          git push origin versions
